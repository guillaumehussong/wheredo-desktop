# Builds the Windows NSIS installer and the Linux .deb + AppImage.
# Runs on every push/PR touching the desktop app (artifacts only), and
# additionally creates a GitHub Release with the installers on tag push (v*).
name: Build desktop installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: nsis
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            bundles: deb,appimage
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            libasound2-dev libxdo-dev \
            pkg-config libclang-dev libxcb1-dev libxrandr-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libegl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build installers
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheredo-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
