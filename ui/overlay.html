<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>guide</title>
<style>
  /* Transparent click-through marker window: pulsing ring + red cursor + label.
     The cursor TIP is anchored at (24, 24) — the Rust side positions the
     window so that point lands exactly on the target screen coordinate. */
  * { margin: 0; padding: 0; }
  html, body {
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  .ring {
    position: absolute;
    left: 24px; top: 24px;
    width: 44px; height: 44px;
    margin: -22px 0 0 -22px;
    border: 4px solid rgba(230, 57, 70, 0.55);
    border-radius: 50%;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.18); opacity: 0.5; }
  }
  svg.cursor {
    position: absolute;
    left: 24px; top: 24px;
    overflow: visible;
  }
  .label {
    position: absolute;
    left: 46px; top: 30px;
    background: rgba(230, 57, 70, 0.95);
    color: #fff;
    font: 700 14px -apple-system, "Segoe UI", Ubuntu, sans-serif;
    padding: 5px 11px;
    border-radius: 9px;
    white-space: nowrap;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
  <div class="ring"></div>
  <svg class="cursor" width="1" height="1">
    <path d="M 0 0 L -16 24 L -6 17 L -10 30 L 3 19 L -2 15 Z"
          fill="#e63946" stroke="#fff" stroke-width="2" />
  </svg>
  <div class="label" id="label"></div>
  <script>
    const label = new URLSearchParams(location.search).get("label") || "";
    const el = document.getElementById("label");
    if (label) { el.textContent = label; } else { el.remove(); }
  </script>
</body>
</html>
